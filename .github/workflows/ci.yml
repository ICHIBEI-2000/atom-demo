name: CI Atom Demo

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4

      - name: Installer les dependances
        run: |
          sudo apt update
          sudo apt install -y cmake g++

      - name: Build
  run: ./scripts/build.sh

- name: Test
  run: ./scripts/test.sh